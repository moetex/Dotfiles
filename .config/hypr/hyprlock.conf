general {
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
}


input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(187, 154, 247, 1.0)
    inner_color = rgba(30, 30, 46, 0.5)
    font_color = rgb(192, 202, 245)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = Moe
    color = rgba(192, 202, 245, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 440
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(192, 202, 245, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B"
    color = rgba(192, 202, 245, 1.0)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] curl -s 'wttr.in/Bremen?format=%c+%t'
    color = rgba(187, 154, 247, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = bottom
}
