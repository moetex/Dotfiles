$mod = ALT

$TERMINAL = alacritty
$BROWSER = firefox

$foreground = rgb(c0caf5)
$highlight = rgb(bb9af7)

$wallpaper = /home/moe/Pictures/Wallpapers/aesthetic-wallpapers/images/Bix57su7.png
$launcher_cmd = wofi --show drun --no-actions --insensitive --prompt 'Run' | xargs hyprctl dispatch exec --

exec-once = waybar -c ~/.config/waybar/config_hypr -s ~/.config/waybar/style_hypr.css
exec-once = mako
# exec-once = kanshi
exec-once = gammastep
exec-once = wl-paste --type text --watch clipman store
exec-once = swaybg -i $wallpaper -m fill
exec-once = hypridle

monitor=DP-1, 1920x1080@144, 1920x0, 1
monitor=eDP-1, 1920x1200@60, 0x0, 1
monitor=,preferred,auto,1

# laptop lid behavior
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1200@60, 0x0, 1"
bindl = , switch:off:Lid Switch, exec, sleep 1 && killall swaybg; swaybg -i $wallpaper -m fill &

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 3
 
    col.active_border = $highlight
    col.inactive_border = rgb(303030)

    layout = dwindle
}

decoration {
    rounding = 0
}

cursor {
    inactive_timeout = 10
}

input {
    kb_layout = de,ara
    kb_options = grp:win_space_toggle

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}


bind = $mod, Return, exec, $TERMINAL
bind = $mod, D, exec, rofi -show drun # ~/.config/rofi/launchers/type-3/launcher.sh
bind = $mod CTRL, Q, exec, loginctl lock-session
bind = $mod, V, exec, clipman pick --tool wofi


bind = $mod SHIFT, Q, killactive,
bind = $mod SHIFT, C, forcerendererreload
bind = $mod SHIFT, Space, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, B, togglesplit, 

# layout / groups fix
bind = $mod, W, togglegroup, 
bind = $mod, E, changegroupactive, f 

# Screenshots
bind = , Print, exec, flameshot gui
bind = SHIFT, Print, exec, sh -c 'mkdir -p ~/Pictures/Screenshots && flameshot full -p ~/Pictures/Screenshots'

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d


# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, donw, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, Tab, workspace, previous

# Move to Workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# media
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous
bind   = , XF86Search, exec, $launcher_cmd

# Resize and move floating windows using mouse
bindm = $mod, mouse:272, movewindow 
bindm = $mod, mouse:273, resizewindow


bind = $mod, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset



